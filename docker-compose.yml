version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tarag-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/usr/src/app          # sync local code
      - /usr/src/app/node_modules       # preserve container node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development

  mongodb:
    image: mongo:7.0
    container_name: tarag-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

volumes:
  mongo_data:
